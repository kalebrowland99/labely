<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Labely – Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f6f1; color: #1a1a1a; }
    header { background: #2e5e35; padding: 40px 24px; text-align: center; }

    .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; padding: 48px 24px; max-width: 700px; margin: 0 auto; }
    .card { background: #fff; border-radius: 16px; padding: 32px 28px; flex: 1; min-width: 240px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); text-decoration: none; color: inherit; transition: transform .15s, box-shadow .15s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.11); }
    .card .icon { font-size: 2rem; margin-bottom: 14px; }
    .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .card p { font-size: 0.9rem; color: #555; line-height: 1.5; }
    footer { text-align: center; padding: 32px 24px; color: #888; font-size: 0.85rem; }
  </style>
</head>

  <header>
